<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/mapbender/http

    Alias /mapbender /var/www/mapbender/http
    Alias /owsproxy  /var/www/mapbender/owsproxy/http
    Alias /owsproxy_api /var/www/mapbender/owsproxy_api/http
    Alias /cors_proxy /var/www/mapbender/cors_proxy/http
    Alias /http_auth /var/www/mapbender/http_auth/http

    <Directory /var/www/mapbender/http>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <Directory /var/www/mapbender/owsproxy/http>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/mapbender/cors_proxy/http>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/mapbender/http_auth/http>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # OWS proxy URL rewrite (from Install.txt; literal slash required to avoid hijacking /owsproxy_api/...)
    RedirectMatch ^.*owsproxy/([^i][\w\d]+)/([\w\d]+)/?$ /owsproxy/index.php?sid=$1&wms=$2&

    <Directory /var/www/mapbender/owsproxy_api/http>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
