; Mapbender expects to be able to fetch remote OWS metadata
allow_url_fopen = On
session.save_handler = files
session.save_path = "/tmp"

; Generous limits — Mapbender often welds large images / PDFs
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300

; Verbose logging while we hunt PHP-8 fallout
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/www/mapbender/log/php_errors.log

date.timezone = Europe/Berlin
